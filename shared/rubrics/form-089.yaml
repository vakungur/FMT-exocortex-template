# FORM.089 §6.1 v4.2 — Рубрики диагностики ступени мастерства
# Source of Truth для diagnose-iwe/SKILL.md
# Изменения здесь требуют перегенерации SKILL.md через scripts/generate-diagnose-iwe-skill.py

schema_version: "4.2"
method: "CAT (Cognitive Assessment Tool)"
start_stage: 3
max_questions: 7
validity_days: 180

slots:
  cp.skl:
    name: "Осознанное инвестирование времени"
    phase: 1
    order: 1
    question: |
      Вы осознанно выделяете время на изучение нового — не просто читаете что попадётся,
      а именно отводите время под развитие?
      Сколько примерно часов в неделю?
    scale:
      1: "Не выделяю осознанно, по ситуации"
      2: "Стараюсь всегда учиться, но ритма нет"
      3: "Явно знаю, что получается 3-4 ч/нед"
      4: "Регулярно, не менее 1 часа в день и до 8 ч/нед"
      5: "Ежедневная практика и более 10 ч/нед"
    drill_down_slot: cp.rhy

  cp.agt:
    name: "Методы и агентность"
    phase: 1
    order: 2
    question: |
      Используете ли вы конкретные методы для своего развития?
      Например: ведение заметок, учёт времени, регулярные сессии стратегирования и планирования.
    scale:
      1: "Нет"
      2: "Иногда пробую что-то, но не приживается"
      3: "Есть 1-2 приёма, применяю"
      4: "Есть много методов, которые осознанно добавляю"
      5: "Развиваю и передаю методы другим"
    drill_down_slot: cp.agt

  cp.wld:
    name: "Мировоззрение и системный взгляд"
    phase: 1
    order: 3
    question: |
      Есть ли у вас принципы, которые определяют ваши важные решения?
      Насколько они явные — вы могли бы их сформулировать прямо сейчас?
    scale:
      1: "Решаю интуитивно"
      2: "Что-то есть, но смутно"
      3: "Могу назвать 2-3 принципа"
      4: "Принципы явные, записаны"
      5: "Есть целостное мировоззрение, передаю другим"
    drill_down_slot: cp.wld

  cp.iwe:
    name: "Инструмент работы со знаниями"
    phase: 1
    order: 4
    question: |
      Насколько хорошо у вас настроен инструмент хранения и обработки знаний —
      заметки, база знаний, инструменты?
    scale:
      1: "У меня его нет"
      2: "Сделал самый простой (заметки в телефоне, папка в облаке)"
      3: "Есть рабочий инструмент, пользуюсь регулярно"
      4: "Настроен процесс работы с несколькими сервисами: структура, связи, поиск"
      5: "Регулярно развиваю его"
    drill_down_slot: cp.int

drill_down:
  cp.rhy:
    name: "Регулярность и ритм занятий"
    question: "Как часто вы занимаетесь саморазвитием в последние 3 месяца? (учебные сессии, чтение, практика)"
    scale:
      1: "Реже раза в месяц"
      2: "1-2 раза в месяц"
      3: "Еженедельно"
      4: "3-5 раз в неделю"
      5: "Ежедневно"

  cp.agt:
    name: "Агентность"
    question: "Берёте ли вы на себя ответственность за результат, даже если обстоятельства были неблагоприятные?"
    scale:
      1: "Обычно жду"
      2: "Иногда пробую"
      3: "Инициирую в своей зоне"
      4: "Регулярно запускаю"
      5: "Создаю среду"

  cp.wld:
    name: "Мировоззрение (уточнение)"
    question: "Можете назвать 2-3 принципа, которые направляют ваши решения? Насколько они сформулированы явно?"
    scale:
      1: "Принципы не сформулированы"
      2: "Есть смутное ощущение"
      3: "Могу назвать 1-2"
      4: "Явные, записаны"
      5: "Работающая система"

  cp.int:
    name: "Системное мышление"
    question: "Системное мышление — видеть связи между частями целого, понимать надсистему и подсистему. Как вы с ним?"
    scale:
      1: "Незнакомо"
      2: "Слышал, не применял"
      3: "Применяю интуитивно"
      4: "Применяю осознанно"
      5: "Учу других"

scoring:
  stage_formula: "min(cp.rhy, cp.wld, cp.skl, cp.int, cp.agt)"
  bottleneck_formula: "argmin(mandatory)"
  stream_formula: "S + max(1, min(4, stage))"
  default_missing: 2
  stages:
    1: { name: "Случайный", label: "S1-Фундамент" }
    2: { name: "Практикующий", label: "S2-Систематизация" }
    3: { name: "Систематический", label: "S3-Масштаб" }
    4: { name: "Дисциплинированный", label: "S4-Передача" }
    5: { name: "Проактивный", label: "S5-Передача" }

bottleneck_labels:
  cp.rhy: "регулярность и ритм занятий"
  cp.wld: "мировоззрение и системный взгляд"
  cp.skl: "осознанное инвестирование времени"
  cp.iwe: "инструмент работы со знаниями"
  cp.int: "системное мышление"
  cp.agt: "методы и агентность"
