# FORM.089 §6.1 v5.0 — Рубрики диагностики ступени мастерства (WP-370)
# Source of Truth для diagnose/SKILL.md
# Изменения здесь требуют обновления SKILL.md; verify: python3 scripts/generate-diagnose-skill.py --check
#
# v5.0 changes (WP-370):
# - cp.skl removed from Phase 1 slots (now derived: scores['cp.skl'] = scores['cp.rhy'])
# - cp.rhy promoted to Phase 1 (was drill-down only)
# - cp.int added to Phase 1
# - All question texts updated to match SKILL.md v5.0

schema_version: "5.0"
method: "CAT (Cognitive Assessment Tool)"
start_stage: 3
max_questions: 6
validity_days: 180

slots:
  cp.rhy:
    name: "Регулярность и учёт времени"
    phase: 1
    order: 1
    question: |
      Как вы ведёте учёт времени на саморазвитие и насколько регулярный ритм?
      Сколько примерно часов в неделю?
    scale:
      1: "Не выделяю, как пойдёт"
      2: "Стараюсь, но без ритма (1-2 ч/нед)"
      3: "Еженедельно явно (3-4 ч/нед)"
      4: "Ежедневная практика + трекер (5-10 ч/нед)"
      5: "Автоматизировано + артефакты (10+ ч/нед)"
    drill_down_slot: cp.rhy

  cp.wld:
    name: "Мировоззрение и системный взгляд"
    phase: 1
    order: 2
    question: |
      Как вы принимаете важные решения?
      Через интуицию, ценности или системный анализ?
    scale:
      1: "В основном интуитивно"
      2: "Пробую разные подходы, не сложилось"
      3: "Через сформулированные принципы / мировоззрение"
      4: "Системно: цели, ограничения, альтернативы"
      5: "Передаю свои методы и принципы другим"
    drill_down_slot: cp.wld

  cp.int:
    name: "Системное мышление"
    phase: 1
    order: 3
    question: |
      Применяете ли вы системное мышление — видите ли роли, границы,
      интерфейсы, надсистемы в реальных задачах?
    scale:
      1: "Нет опыта"
      2: "Слышал(а), но не применяю"
      3: "Базовые различения (роль/функция/граница)"
      4: "Системный разбор в работе"
      5: "Формализую модели, учу других"
    drill_down_slot: cp.int

  cp.agt:
    name: "Агентность и инициатива"
    phase: 1
    order: 4
    question: |
      Какая доля задач за последний месяц инициирована вами лично —
      не «спустили», а вы сами увидели и взяли?
    scale:
      1: "Почти всё спущено сверху"
      2: "Иногда сам(а), редко"
      3: "Около половины — мои"
      4: "Большинство задач — моя инициатива"
      5: "Задаю повестку для других"
    drill_down_slot: cp.agt

  cp.iwe:
    name: "Рабочая среда и инструменты (информационный)"
    phase: 1
    order: 5
    informational: true
    question: |
      Насколько у вас настроена среда работы со знаниями —
      заметки, база знаний, инструменты (VS Code + Pack + ИИ, или альтернативы)?
    scale:
      1: "Среды нет"
      2: "Простейшее (заметки в телефоне, папка в облаке)"
      3: "Базово настроено, пользуюсь регулярно"
      4: "Несколько сервисов, структура, связи, поиск"
      5: "Развиваю как систему — Pack/протоколы/агенты"
    drill_down_slot: null

drill_down:
  cp.rhy:
    name: "Ритуалы и регулярность"
    question: "Есть ли у вас «ритуалы» начала/завершения рабочей недели? Или регулярные точки рефлексии?"
    scale:
      1: "Нет ничего"
      2: "Иногда делаю итоги"
      3: "Еженедельный ритуал"
      4: "Структурированные ритуалы"
      5: "Полная ОРЗ-практика"

  cp.wld:
    name: "Мировоззрение (уточнение)"
    question: "Можете назвать 2-3 принципа, которые направляют ваши решения? Насколько они явные?"
    scale:
      1: "Не сформулированы"
      2: "Смутное ощущение"
      3: "Могу назвать 1-2"
      4: "Явные, записаны"
      5: "Работающая система"

  cp.int:
    name: "Системное мышление (уточнение)"
    question: "Пробовали ли вы разбирать ситуацию через надсистему и подсистему? Выделять роли, функции, ограничения?"
    scale:
      1: "Незнакомо"
      2: "Слышал(а), не применял(а)"
      3: "Интуитивно"
      4: "Осознанно"
      5: "Учу других"

  cp.agt:
    name: "Агентность (уточнение)"
    question: "Берёте ли вы на себя ответственность за результат, даже если обстоятельства были неблагоприятные?"
    scale:
      1: "Объясняю обстоятельствами"
      2: "Иногда беру"
      3: "Обычно беру"
      4: "Всегда беру"
      5: "Задаю стандарты"

scoring:
  stage_formula: "min(vals.values())"
  bottleneck_formula: "min(mandatory_scores, key=mandatory_scores.get)"
  stream_formula: "S + max(1, min(4, stage))"
  default_missing: 2
  stages:
    1: { name: "Случайный", label: "S1-Фундамент" }
    2: { name: "Практикующий", label: "S2-Систематизация" }
    3: { name: "Систематический", label: "S3-Масштаб" }
    4: { name: "Дисциплинированный", label: "S4-Передача" }
    5: { name: "Проактивный", label: "S5-Передача" }

bottleneck_labels:
  cp.rhy: "регулярность и ритм занятий"
  cp.wld: "мировоззрение и системный взгляд"
  cp.skl: "учёт времени и собранность"
  cp.iwe: "рабочая среда и инструменты"
  cp.int: "системное мышление"
  cp.agt: "агентность и инициатива"
