# Каталог локальных моделей IWE (РП404, ADR-001).
# Единый источник для установщика (install-local-llm.sh), монитора (model-monitor.py)
# и жизненного цикла (model-lifecycle.py).
#
# Жизненный цикл модели (поле status):
#   analysis  — найдена монитором, на рассмотрении (ещё не скачана, не вошла в работу)
#   testing   — скачана для проверки (в кэше), сравнивается с активной
#   active     — стоит в работе (сервер поднимает именно её); ровно одна
#   archived   — выведена из обращения (устарела/проиграла сравнение)
# job: privacy=приватность(PII), fallback=без сети/токенов, bulk=дешёвый поток.
#
# Шаблонный дефолт: все модели в analysis. install-local-llm.sh при установке
# сделает рекомендованную (или --max) активной под железо пилота.

updated: 2026-06-10

# Источники сигнала для biweekly-мониторинга (model-monitor.py)
sources:
- name: lmarena
  url: https://lmarena.ai
  note: общий лидерборд качества (ручная сверка)
- name: hf-mlx-community
  api: https://huggingface.co/api/models?author=mlx-community&sort=trendingScore&limit=25&pipeline_tag=text-generation
  note: релизы квантованных моделей под Apple Silicon

# Модели. status — текущее состояние в жизненном цикле. min_ram_gb — порог установщика.
models:
- id: mlx-community/Llama-3.2-3B-Instruct-4bit
  status: analysis
  params_b: 3
  quant: 4bit
  min_ram_gb: 8
  job: [privacy]
  note: лёгкая для мгновенной приватности на 16GB и меньше
- id: mlx-community/Qwen2.5-7B-Instruct-4bit
  status: analysis
  params_b: 7
  quant: 4bit
  min_ram_gb: 12
  job: [privacy, fallback]
  recommended: true   # дефолт установщика; проверена на PII-редактировании
  note: MVP, general, сильная
- id: mlx-community/Qwen2.5-14B-Instruct-4bit
  status: analysis
  params_b: 14
  quant: 4bit
  min_ram_gb: 24
  job: [privacy, fallback, bulk]
  note: для 32GB+, выше качество, медленнее
