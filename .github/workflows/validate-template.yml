name: Validate Template

# see VR.SC.006 (release-verification-protocol), VR.M.006 (5-layer verification)
# see AR.203 (release verification trigger)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Defense-in-depth для случая --no-verify в pre-commit + прямого push.
  # Отдельный job, чтобы шёл независимо от validate/shellcheck (не зависит от их успеха).
  release-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check CHANGELOG/manifest version sync
        run: |
          if [ ! -f "CHANGELOG.md" ] || [ ! -f "update-manifest.json" ]; then
            echo "SKIP: CHANGELOG.md или update-manifest.json не найдены"
            exit 0
          fi
          CHANGELOG_VERSION=$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md \
              | sed 's/^## \[//;s/\]$//' || true)
          MANIFEST_VERSION=$(grep -m1 '"version"' update-manifest.json \
              | sed 's/.*"version"[[:space:]]*:[[:space:]]*"//;s/".*//' || true)
          if [ -z "$CHANGELOG_VERSION" ] || [ -z "$MANIFEST_VERSION" ]; then
            echo "FAIL: не удалось извлечь версии (CHANGELOG=$CHANGELOG_VERSION, manifest=$MANIFEST_VERSION)"
            exit 1
          fi
          if [ "$CHANGELOG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "FAIL: рассинхрон версий!"
            echo "  CHANGELOG.md top:     $CHANGELOG_VERSION"
            echo "  update-manifest.json: $MANIFEST_VERSION"
            echo "  update.sh --check парсит manifest — пользователи не получат обновлений."
            echo "  Fix: bump version в update-manifest.json до $CHANGELOG_VERSION"
            exit 1
          fi
          echo "PASS: CHANGELOG/manifest version sync ($CHANGELOG_VERSION)"
      - name: Check README version badge sync
        run: bash scripts/sync-version-badge.sh --check

  # Integration contract validator + fresh-install smoke-test.
  # Defense-in-depth для случая `git commit --no-verify` в pre-commit.
  # Корень бага (29 апр, 0.29.13 регрессия): template-sync пропихнул pre-0.29.5
  # код в FMT, валидаторы НЕ были в CI — Євгений нашёл на fresh clone, у нас
  # commit прошёл. Гейт: те же 2 скрипта что Євгений запускает локально.
  integration-contract:
    # OS matrix (0.29.18): пилоты на macOS И Linux. CI на ubuntu-latest пропускал
    # портабельность-баги (0.28.12 BUG-2..4 на Linux). Прогон на обеих ОС.
    # GOVERNANCE_REPO matrix (12 мая, после Bug 1 b24639f): smoke прогоняется с
    # разными значениями GOVERNANCE_REPO, чтобы поймать hardcoded /DS-strategy/
    # пути которые проходят при дефолтном значении.
    # NB: validator+test-detectors дублируются 2× по gov_repo (4 прогона вместо 2)
    # — не зависят от gov_repo, но изоляция в отдельный job усложнила бы yml.
    # Trade-off приемлемый: оба скрипта быстрые (<10 сек суммарно).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        gov_repo: [DS-strategy, DS-pilot-strategy]
    runs-on: ${{ matrix.os }}
    env:
      SMOKE_GOVERNANCE_REPO: ${{ matrix.gov_repo }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 jq
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq  # python3 preinstalled
      - name: Run integration-contract-validator (8 detectors)
        run: bash setup/integration-contract-validator.sh
      - name: Run smoke-test-fresh-install (GOVERNANCE_REPO=${{ matrix.gov_repo }})
        run: bash setup/smoke-test-fresh-install.sh
      - name: Run detector regression fixtures (regex gap guard)
        run: bash setup/test-detectors.sh

  # Upgrade-flow regression test (0.29.18).
  # Корень бага (0.29.13): template-sync перезаписал FMT файлы — smoke-test fresh
  # build не ловит это, потому что build-runtime создаёт `.iwe-runtime` с нуля,
  # а пилот делает upgrade поверх существующего состояния. Этот job симулирует:
  # checkout previous version → setup → checkout HEAD → re-run validator.
  upgrade-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history для git log
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 jq
      - name: Determine previous version
        id: prev
        run: |
          # Найти предыдущий коммит, поднявший version в update-manifest.json.
          # Логика: git log -p update-manifest.json → найти второй "version" bump
          # → его commit hash. Это предыдущая опубликованная версия.
          PREV_SHA=$(git log --format=%H -- update-manifest.json | sed -n '2p')
          if [ -z "$PREV_SHA" ]; then
            echo "SKIP: нет предыдущей версии в истории update-manifest.json"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          PREV_VER=$(git show "$PREV_SHA:update-manifest.json" 2>/dev/null \
            | grep -m1 '"version"' | sed 's/.*"version"[[:space:]]*:[[:space:]]*"//;s/".*//')
          echo "PREVIOUS: $PREV_VER ($PREV_SHA)"
          echo "sha=$PREV_SHA" >> $GITHUB_OUTPUT
          echo "ver=$PREV_VER" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
      - name: Upgrade simulation — checkout prev → smoke → checkout HEAD → validate
        if: steps.prev.outputs.skip != 'true'
        run: |
          # Шаг 1: build-runtime на предыдущей версии (имитация уже-установленного пилота).
          git checkout ${{ steps.prev.outputs.sha }}
          bash setup/smoke-test-fresh-install.sh > /tmp/prev_smoke.log 2>&1 || {
            echo "WARN: previous version smoke-test FAILED (это OK — мы тестируем upgrade-flow)"
            tail -20 /tmp/prev_smoke.log
          }
          # Шаг 2: возврат на HEAD, прогон ТЕКУЩЕГО validator + smoke.
          # Если HEAD-validator прошёл fresh + после prev-smoke build-runtime — upgrade OK.
          git checkout -
          bash setup/integration-contract-validator.sh
          bash setup/smoke-test-fresh-install.sh
          echo "PASS: upgrade ${{ steps.prev.outputs.ver }} → HEAD не ломает контракт"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all .sh files
        run: |
          # Severity = error: блокируем только реальные баги, не стиль/false-positive.
          # Пред-существующие warnings (SC2034 unused vars от export-pattern, SC1090
          # source non-constant, SC2155 declare-and-assign, etc) — информативны,
          # не блокируют. При желании ужесточить — поднять до warning.
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! shellcheck -S error "$f"; then
              FAIL=1
            fi
          done < <(find . -name "*.sh" -type f -print0)
          exit $FAIL

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # C1 fix (0.28.6): CI source-of-truth = local validator (setup/validate-template.sh).
      # Раньше CI имел собственный inline blacklist, который расходился с local — например,
      # PROTOCOL_PATHS включал `roles/`, что ловило conditional refs в strategist prompts.
      # Теперь CI делегирует author-specific / hardcoded-paths / MEMORY-skeleton / required-files /
      # hooks-cross-ref в local validator; CI-only остаются: smoke-test, MCP doc, placeholders.
      - name: Run local validator (source-of-truth)
        run: bash setup/validate-template.sh "$PWD"

      # validate-fmt-scripts: проверка на личные хардкоды и нарушения конвенций.
      # Корень бага (май 2026): detector ловил legitimate uses (template identity,
      # python fallback, env override) как false positives. Исправлено в validate-fmt-scripts.sh.
      # Гейт: прогоняем в CI, чтобы не полагаться только на pre-commit (который зовётся
      # только при staged .claude/settings.json) и ручной запуск.
      - name: Run validate-fmt-scripts (author-specific hardcodes & conventions)
        run: bash scripts/validate-fmt-scripts.sh

      # CI-only check: MCP — серверы подключаются через claude.ai/settings/connectors
      - name: Check MCP documentation
        run: |
          if grep -q "claude.ai/settings/connectors" setup.sh; then
            echo "PASS: setup.sh contains MCP connector instructions"
          else
            echo "FAIL: setup.sh missing MCP connector instructions"
            exit 1
          fi

      # 6. Smoke-test: хуки не падают на чистом пользовательском окружении.
      # Имитируем pristine user: DS-strategy вместо DS-my-strategy, DayPlan с минимальным шаблоном.
      - name: Smoke-test protocol hooks on clean user env
        run: |
          FAIL=0
          TMP=$(mktemp -d)
          export IWE_WORKSPACE="$TMP"
          export IWE_GOVERNANCE_REPO="DS-strategy"
          mkdir -p "$TMP/DS-strategy/current"

          # Минимальный DayPlan, удовлетворяющий SECTIONS из хука
          cat > "$TMP/DS-strategy/current/DayPlan 2026-04-22.md" <<'DAYPLAN'
          ---
          type: daily-plan
          date: 2026-04-22
          ---

          # Day Plan: 22 апреля 2026

          <details open>
          <summary><b>План на сегодня</b></summary>

          **Бюджет дня:** ~4h РП / ~3h физ / Плановый мультипликатор ~1.3x
          mandatory: WP-7 + контент
          carry-over: —
          </details>
          <details>
          <summary><b>Календарь (22 апр)</b></summary>

          | 10:00 | событие | 1h |
          </details>
          <details>
          <summary><b>IWE за ночь (светофор)</b></summary>

          | Scheduler | 🟢 | ok |
          </details>
          <details>
          <summary><b>Наработки Scout (разбор)</b></summary>

          нет находок
          </details>
          <details>
          <summary><b>Разбор заметок</b></summary>

          все обработаны
          </details>
          <details>
          <summary><b>Итоги вчера</b></summary>

          коммитов: 3
          </details>
          DAYPLAN

          # Прогон хука: имитируем PreToolUse с git commit DayPlan
          INPUT=$(jq -n --arg cmd "git add DS-strategy/current/DayPlan\\ 2026-04-22.md && git commit -m test" \
                  '{tool_name: "Bash", tool_input: {command: $cmd}}')
          RESULT=$(echo "$INPUT" | bash .claude/hooks/protocol-artifact-validate.sh)
          DECISION=$(echo "$RESULT" | jq -r '.decision // "allow"')

          if [ "$DECISION" = "block" ]; then
            echo "FAIL: hook blocked commit on clean user env:"
            echo "$RESULT" | jq -r '.reason'
            FAIL=1
          else
            echo "PASS: hook allows commit on clean DS-strategy env"
          fi

          rm -rf "$TMP"
          exit $FAIL

      # B2 gap closure: проверяем что все файлы репо покрыты update-manifest.json.
      # Новый файл без записи в manifest = обновление не доедет до пользователей.
      # Исправление: добавить в manifest["files"] или manifest["excluded_paths"].
      - name: Check manifest completeness (B2)
        run: |
          git ls-files | python3 scripts/check-manifest-coverage.py update-manifest.json

      # 7. Только допустимые placeholders
      - name: Check placeholders are valid
        run: |
          # Найти все {{...}} и проверить что они из допустимого списка
          ALLOWED="HOME_DIR|WORKSPACE_DIR|GITHUB_USER|CLAUDE_PATH|CLAUDE_PROJECT_SLUG|TIMEZONE_HOUR|TIMEZONE_DESC"
          INVALID=$(grep -rohP '\{\{[A-Z_]+\}\}' . --include="*.md" --include="*.sh" \
                    --include="*.json" --include="*.plist" 2>/dev/null \
                    | sort -u \
                    | grep -vP "\{\{($ALLOWED)\}\}" || true)
          if [ -n "$INVALID" ]; then
            echo "WARN: Unknown placeholders found:"
            echo "$INVALID"
            echo "(This is a warning, not a failure — new placeholders may be intentional)"
          else
            echo "PASS: All placeholders are valid"
          fi
